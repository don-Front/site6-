<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Шаг 4: Параметры</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    /* === СТИЛИ ДЛЯ ФОРМЫ ПАРАМЕТРОВ === */
    .params-form { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 30px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    
    .params-description { 
      color: #6c757d; 
      margin-bottom: 30px; 
      font-size: 16px;
      line-height: 1.6;
      text-align: center;
      font-weight: 500;
    }
    
    .param-row { 
      display: flex; 
      align-items: flex-start; 
      gap: 20px; 
      margin-bottom: 20px; 
      padding: 25px;
      background: #ffffff;
      border: 2px solid #e9ecef;
      border-radius: 15px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .param-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #4a90e2, #357abd);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .param-row:hover {
      border-color: #4a90e2;
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.15);
      transform: translateX(5px);
    }
    
    .param-row:hover::before {
      opacity: 1;
    }
    
    .param-icon { 
      flex-shrink: 0; 
      width: 50px; 
      height: 50px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: linear-gradient(135deg, #e8f4fd, #f0f8ff);
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    
    .param-row:hover .param-icon {
      transform: scale(1.1) rotate(5deg);
      background: linear-gradient(135deg, #d6ebfa, #e0f2ff);
    }
    
    .param-icon svg {
      width: 28px;
      height: 28px;
    }
    
    .param-content { 
      flex: 1; 
    }
    
    .param-label { 
      display: block; 
      font-weight: 700; 
      color: #2c3e50; 
      margin-bottom: 15px; 
      font-size: 17px;
    }
    
    .param-inputs { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      flex-wrap: wrap; 
    }
    
    .input-label { 
      font-size: 14px; 
      color: #6c757d; 
      font-weight: 600;
      min-width: 40px;
    }
    
    .param-input { 
      padding: 12px 16px; 
      border: 2px solid #e0e0e0; 
      border-radius: 10px; 
      font-size: 15px; 
      width: 90px; 
      text-align: center;
      transition: all 0.3s ease;
      font-weight: 600;
      color: #2c3e50;
      background: #ffffff;
    }
    
    .param-input.single { 
      width: 130px; 
    }
    
    .param-input:focus { 
      outline: none; 
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
      transform: scale(1.02);
    }
    
    .param-input:hover {
      border-color: #4a90e2;
    }
    
    .unit-text { 
      font-size: 15px; 
      color: #6c757d; 
      font-weight: 600;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .unit-buttons { 
      display: flex; 
      gap: 8px; 
      margin-left: 10px;
      background: #f8f9fa;
      padding: 4px;
      border-radius: 10px;
    }
    
    .unit-btn { 
      padding: 8px 16px; 
      border: 2px solid transparent; 
      background: transparent; 
      border-radius: 8px; 
      font-size: 13px; 
      cursor: pointer; 
      transition: all 0.3s ease;
      font-weight: 600;
      color: #6c757d;
    }
    
    .unit-btn.active { 
      background: #4a90e2; 
      color: #fff; 
      border-color: #4a90e2;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
      transform: scale(1.05);
    }
    
    .unit-btn:hover:not(.active) { 
      background: #e9ecef;
      color: #4a90e2;
      transform: scale(1.05);
    }
    
    .form-actions { 
      margin-top: 40px; 
      display: flex; 
      gap: 20px; 
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn { 
      border: none;
      background: linear-gradient(135deg, #4a90e2, #357abd); 
      color: #fff; 
      border-radius: 12px; 
      padding: 16px 40px; 
      cursor: pointer; 
      font-weight: 700; 
      transition: all 0.3s ease; 
      font-size: 17px;
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .btn:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .btn:hover { 
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4);
    }
    
    .btn:active {
      transform: translateY(-1px);
    }
    
    .calculate-btn { 
      min-width: 200px;
      position: relative;
    }
    
    .calculate-btn span {
      position: relative;
      z-index: 1;
    }
    
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      color: #2c3e50;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-back:hover {
      background: #f8f9fa;
      border-color: #4a90e2;
      color: #4a90e2;
      transform: translateX(-5px);
    }
    
    .btn-back .arrow-left {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    
    .btn-back:hover .arrow-left {
      transform: translateX(-3px);
    }
    
    /* Анимация загрузки для кнопки рассчитать */
    .btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    
    .btn.loading::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      top: 50%;
      left: 50%;
      margin-left: -8px;
      margin-top: -8px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Группировка параметров */
    .param-group-title {
      font-size: 14px;
      font-weight: 700;
      color: #4a90e2;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 30px 0 15px 0;
      padding-left: 10px;
      border-left: 4px solid #4a90e2;
    }
    
    .param-group-title:first-child {
      margin-top: 0;
    }
    
    /* Адаптивность */
    @media (max-width: 768px) {
      .params-form {
        padding: 20px;
      }
      
      .param-row {
        flex-direction: column;
        padding: 20px;
        gap: 15px;
      }
      
      .param-row:hover {
        transform: none;
      }
      
      .param-icon {
        width: 45px;
        height: 45px;
      }
      
      .param-inputs {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      
      .input-label {
        min-width: auto;
      }
      
      .param-input {
        width: 100%;
        max-width: 200px;
      }
      
      .param-input.single {
        width: 100%;
        max-width: 200px;
      }
      
      .unit-buttons {
        margin-left: 0;
        width: 100%;
        justify-content: flex-start;
      }
      
      .form-actions {
        flex-direction: column-reverse;
        gap: 15px;
      }
      
      .btn, .btn-back {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="step-title">Шаг 4: Параметры</h1>
    <p class="step-description">Укажите рабочие параметры для расчёта и подбора оборудования.</p>

    <div class="params-form">
      <p class="params-description">Введите технические параметры оборудования для точного подбора</p>
      
      <div class="param-group-title">Основные параметры</div>
      
      <!-- Расход -->
      <div class="param-row">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="#4a90e2"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Расход</label>
          <div class="param-inputs">
            <span class="input-label">Мин:</span>
            <input type="number" value="150" class="param-input" name="flowMin" />
            <span class="input-label">Макс:</span>
            <input type="number" value="200" class="param-input" name="flowMax" />
            <div class="unit-buttons" id="flow-units">
              <!-- Единицы измерения будут добавлены через JavaScript -->
            </div>
          </div>
        </div>
      </div>

      <!-- Диаметр -->
      <div class="param-row">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="#4a90e2" stroke-width="2.5" fill="none"/>
            <line x1="3" y1="12" x2="21" y2="12" stroke="#4a90e2" stroke-width="2.5"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Диаметр трубопровода</label>
          <div class="param-inputs">
            <input type="number" value="50" class="param-input single" name="diameter" />
            <span class="unit-text">мм</span>
          </div>
        </div>
      </div>

      <div class="param-group-title">Условия эксплуатации</div>

      <!-- Давление -->
      <div class="param-row">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#4a90e2"/>
            <path d="M12 6v6l4 2" stroke="#4a90e2" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Рабочее давление</label>
          <div class="param-inputs">
            <span class="input-label">Мин:</span>
            <input type="number" value="1" class="param-input" name="pressureMin" step="0.1" />
            <span class="input-label">Макс:</span>
            <input type="number" value="1.6" class="param-input" name="pressureMax" step="0.1" />
            <span class="unit-text">МПа</span>
          </div>
        </div>
      </div>

      <!-- Температура среды -->
      <div class="param-row">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="3" width="6" height="13" rx="3" stroke="#4a90e2" stroke-width="2" fill="none"/>
            <circle cx="12" cy="19" r="3" fill="#4a90e2"/>
            <line x1="12" y1="16" x2="12" y2="8" stroke="#4a90e2" stroke-width="2"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Температура рабочей среды</label>
          <div class="param-inputs">
            <span class="input-label">Мин:</span>
            <input type="number" value="-10" class="param-input" name="tempMediumMin" />
            <span class="input-label">Макс:</span>
            <input type="number" value="10" class="param-input" name="tempMediumMax" />
            <span class="unit-text">°C</span>
          </div>
        </div>
      </div>

      <!-- Температура окружающей среды -->
      <div class="param-row">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" stroke="#4a90e2" stroke-width="2" fill="none"/>
            <line x1="12" y1="1" x2="12" y2="5" stroke="#4a90e2" stroke-width="2"/>
            <line x1="12" y1="19" x2="12" y2="23" stroke="#4a90e2" stroke-width="2"/>
            <line x1="4.22" y1="4.22" x2="7.05" y2="7.05" stroke="#4a90e2" stroke-width="2"/>
            <line x1="16.95" y1="16.95" x2="19.78" y2="19.78" stroke="#4a90e2" stroke-width="2"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Температура окружающей среды</label>
          <div class="param-inputs">
            <span class="input-label">Мин:</span>
            <input type="number" value="-10" class="param-input" name="tempAmbientMin" />
            <span class="input-label">Макс:</span>
            <input type="number" value="10" class="param-input" name="tempAmbientMax" />
            <span class="unit-text">°C</span>
          </div>
        </div>
      </div>

      <!-- Плотность жидкости (только для жидкостей) -->
      <div class="param-row" id="density-row" style="display: none;">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#4a90e2"/>
            <circle cx="12" cy="9" r="2.5" fill="white"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Плотность рабочей жидкости</label>
          <div class="param-inputs">
            <span class="input-label">Мин:</span>
            <input type="number" value="800" class="param-input" name="densityMin" />
            <span class="input-label">Макс:</span>
            <input type="number" value="1200" class="param-input" name="densityMax" />
            <span class="unit-text">кг/м³</span>
          </div>
        </div>
      </div>

      <div class="param-group-title">Требования к точности</div>

      <!-- Точность -->
      <div class="param-row">
        <div class="param-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" fill="#4a90e2"/>
            <circle cx="12" cy="12" r="7" stroke="#4a90e2" stroke-width="2" fill="none"/>
            <circle cx="12" cy="12" r="10" stroke="#4a90e2" stroke-width="1.5" fill="none" opacity="0.5"/>
          </svg>
        </div>
        <div class="param-content">
          <label class="param-label">Требуемая точность измерений</label>
          <div class="param-inputs">
            <input type="number" value="1.0" step="0.1" class="param-input single" name="accuracy" />
            <span class="unit-text">%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button id="calculate-btn" class="btn calculate-btn">
        <span>🔍 Рассчитать и подобрать</span>
      </button>
      <button id="back-btn-page" class="btn-back">
        <span class="arrow-left">←</span>
        <span>Назад</span>
      </button>
    </div>
  </div>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const medium = params.get('medium') || 'gas';
      const application = params.get('application') || '';
      const gasType = params.get('gas_type') || '';
      
      document.body.dataset.medium = medium;
      document.body.dataset.application = application;
      document.body.dataset.gasType = gasType;
      
      // Функция для настройки параметров в зависимости от типа среды
      function setupMediumSpecificParams() {
        const flowUnitsContainer = document.getElementById('flow-units');
        const densityRow = document.getElementById('density-row');
        
        if (medium === 'liquid') {
          // Для жидкости показываем плотность и другие единицы расхода
          densityRow.style.display = 'flex';
          
          // Единицы измерения расхода для жидкости
          flowUnitsContainer.innerHTML = `
            <button class="unit-btn active" data-unit="м³/ч">м³/ч</button>
            <button class="unit-btn" data-unit="кг/ч">кг/ч</button>
          `;
        } else {
          // Для газа скрываем плотность и показываем газовые единицы
          densityRow.style.display = 'none';
          
          // Единицы измерения расхода для газа
          flowUnitsContainer.innerHTML = `
            <button class="unit-btn active" data-unit="м³/ч">м³/ч</button>
            <button class="unit-btn" data-unit="ст.м³/ч">ст.м³/ч</button>
          `;
        }
      }
      
      // Функциональность переключения кнопок единиц измерения
      document.addEventListener('DOMContentLoaded', function() {
        // Настраиваем параметры для текущего типа среды
        setupMediumSpecificParams();
        
        // Обработчик для кнопок единиц измерения
        document.addEventListener('click', function(e) {
          if (e.target.classList.contains('unit-btn')) {
            // Убираем активный класс со всех кнопок в той же группе
            const parentRow = e.target.closest('.param-row');
            const siblingButtons = parentRow.querySelectorAll('.unit-btn');
            siblingButtons.forEach(btn => btn.classList.remove('active'));
            
            // Добавляем активный класс к нажатой кнопке
            e.target.classList.add('active');
          }
        });
      
        // Обработчик кнопки "Рассчитать" теперь в app.js
        // Удален дублирующий обработчик для избежания конфликтов
      });
    })();
  </script>
  <script src="/static/js/app.js?v=20250901113600"></script>
</body>
</html>
